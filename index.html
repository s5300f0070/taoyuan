                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {processedSchedule.length === 0 ? (
                                                <tr>
                                                    <td colSpan={scheduleData.dates.length + 1} className="text-center py-10 text-slate-400 text-sm">
                                                        <div className="flex flex-col items-center gap-2">
                                                            <i className="fa-solid fa-filter-circle-xmark text-2xl opacity-50"></i>
                                                            <span>沒有符合篩選條件的資料</span>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ) : (
                                                processedSchedule.map((user) => {
                                                    const isMe = user.name === currentUser;
                                                    const isOthers = currentUser !== "" && !isMe;
                                                    
                                                    const rowBg = isMe ? "bg-blue-50/80" : "bg-white";
                                                    const nameColor = isMe ? "text-blue-800 font-black text-[15px]" : "text-slate-700 font-medium text-sm";
                                                    const rowOpacity = (isOthers && viewMode !== 'shift') ? "opacity-30 hover:opacity-50 grayscale-[50%]" : "opacity-100";
                                                    const activeRing = (isMe && viewMode !== 'shift') ? "relative z-20 shadow-[0_4px_10px_rgba(59,130,246,0.1)] ring-2 ring-blue-400" : "";
                                                    
                                                    const canEdit = viewMode === 'edit' && (isMe || isAdmin);

                                                    return (
                                                        <tr key={user.name} className={`${rowBg} ${rowOpacity} ${activeRing} hover:bg-slate-50 transition-all duration-300`}>
                                                            <td className={`sticky left-0 ${isMe ? 'z-30' : 'z-20'} ${rowBg} p-0 border-r border-slate-100 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] transition-colors duration-300`}>
                                                                <div className="h-12 flex items-center px-4 relative">
                                                                    {isMe && <div className="w-2 h-full bg-blue-600 absolute left-0 top-0 shadow-[2px_0_5px_rgba(59,130,246,0.5)]"></div>}
                                                                    <div className="flex items-center h-full w-full">
                                                                        <span className={`truncate w-full transition-all duration-300 ${nameColor}`}>
                                                                            {user.name || "未命名"}
                                                                        </span>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            {scheduleData.dates.map(date => (
                                                                <td key={`${user.name}-${date}`} className={`p-1 border-r ${isMe ? 'border-blue-100' : 'border-slate-50'} text-center h-12`}>
                                                                    <ShiftBadge 
                                                                        data={user.shifts[date]} 
                                                                        isEditable={canEdit}
                                                                        isSmall={true}
                                                                        viewMode={viewMode}
                                                                        shiftsConfig={shiftsConfig}
                                                                        isSelected={selectedCells.includes(`${user.name}_${date}`)}
                                                                        onClick={() => handleCellClick(user.name, date, user.shifts[date])}
                                                                    />
                                                                </td>
                                                            ))}
                                                        </tr>
                                                    );
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center justify-center h-full text-slate-400">
                                    <i className="fa-regular fa-calendar-xmark text-4xl mb-3 opacity-50"></i>
                                    <span className="text-sm font-medium">本月尚無班表資料</span>
                                </div>
                            )}
                        </div>

                        <div className="bg-white border-t border-slate-200 p-3 shrink-0 overflow-x-auto no-scrollbar">
                            <div className="flex justify-start md:justify-center gap-4 min-w-max px-2">
                                {shiftsConfig.map(s => (
                                    <div key={s.type} className="flex items-center text-xs text-slate-600">
                                        <span className="w-3 h-3 rounded shadow-sm border border-black/10 mr-1.5" style={{backgroundColor: s.hex || '#E2E8F0'}}></span>{s.type}
                                    </div>
                                ))}
                                <div className="flex items-center text-xs text-slate-600"><span className="w-3 h-3 rounded bg-yellow-100 border border-yellow-200 shadow-sm mr-1.5"></span>休假</div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
